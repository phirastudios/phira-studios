<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phira Studios — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #EAEBED 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #5C6B73;
            overflow: hidden;
            position: relative;
        }

        /* Decorative background element */
        body::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(96, 14, 19, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -300px;
            left: -300px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(92, 107, 115, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            text-align: center;
            max-width: 600px;
            position: relative;
            z-index: 1;
            animation: fadeUp 1.2s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 400;
            color: #600E13;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: #600E13;
            margin: 2rem auto;
            opacity: 0.4;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.875rem, 1.5vw, 1rem);
            font-weight: 300;
            color: #5C6B73;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
        }

        .message {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.25rem, 2.5vw, 1.75rem);
            font-weight: 300;
            font-style: italic;
            color: #5C6B73;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 400;
            color: #600E13;
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(96, 14, 19, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #600E13;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #5C6B73;
            opacity: 0.6;
            letter-spacing: 0.1em;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">Phira Studios</h1>
        <div class="divider"></div>
        <p class="tagline">AI Solutions · Web Design · Photography</p>
        <p class="message">Something beautiful is being crafted.<br>We'll be live soon.</p>
        <div class="status">
            <span class="pulse"></span>
            <span>Site launching shortly</span>
        </div>
    </div>
    <div class="footer">© 2026 Phira Studios</div>
</body>
</html>
